<section id="inicio" class="section hero">
  <div class="hero-scene" aria-hidden="true">
    <img class="hero-scene__mountains" src="assets/hero-layers/mountains.png" alt="">
    <img class="hero-scene__tide hero-scene__tide--back" src="assets/hero-layers/tide-back.png" alt="">
    <img class="hero-scene__tide hero-scene__tide--middle" src="assets/hero-layers/tide-middle.png" alt="">
    <img class="hero-scene__tide hero-scene__tide--front" src="assets/hero-layers/tide-front.png" alt="">
    <img class="hero-scene__ship" src="assets/hero-layers/ship.png" alt="">
  </div>

  <div class="container hero__inner">
    <div class="copy">
      <p class="eyebrow" appReveal [immediate]="true">Agencia Digital</p>
      <h1 appReveal [mask]="true" [immediate]="true" [delay]="80">Navegamos ideas.<br>Construimos<span class="hero__mobile-break"><br></span> experiencias digitales<span>.</span></h1>
      <p class="lead" appReveal [immediate]="true" [delay]="160">Desarrollamos sitios web a medida, interfaces frontend de alto impacto y productos digitales que conectan marcas con personas y generan resultados.</p>
      <div class="actions" appReveal [immediate]="true" [delay]="240">
        <a class="btn" href="#proyectos">Ver proyectos <span aria-hidden="true">→</span></a>
        <a class="btn btn--ghost" href="#contacto">Hablemos <span aria-hidden="true">→</span></a>
      </div>
    </div>
  </div>
</section>
